<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FoodShare{% endblock %}</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>

{% if not request.user.is_authenticated %}
<nav class="public-nav">
    <a class="nav-brand" href="{% url 'donation-list' %}">
        <span>🌿</span> FoodShare
    </a>
    <div class="nav-right">
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm fw-700" style="border-color:rgba(255,255,255,0.35);">Sign In</a>
        <a href="{% url 'register' %}" class="btn btn-light btn-sm fw-800" style="color:#1b4332;">Join Free</a>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
